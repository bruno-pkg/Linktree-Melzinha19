<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Área Privada</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(180deg, #000, #1a001a);
    color: white;
    text-align: center;
}

.container {
    max-width: 400px;
    margin: auto;
    padding: 20px;
}

.profile-img {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 3px solid #ff0080;
    object-fit: cover;
}

h1 {
    margin: 10px 0;
    font-size: 22px;
}

.status {
    color: #00ff99;
    font-size: 14px;
}

.bio {
    margin: 15px 0;
    color: #ccc;
    line-height: 1.5;
}

.btn {
    display: block;
    background: linear-gradient(90deg, #ff0080, #ff4d4d);
    color: white;
    padding: 18px;
    margin: 20px 0;
    border-radius: 40px;
    text-decoration: none;
    font-weight: bold;
    font-size: 17px;
    box-shadow: 0 0 20px rgba(255,0,128,0.6);
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
}

.timer {
    margin-top: 10px;
    color: #ff4d4d;
    font-weight: bold;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

<img src="https://i.imgur.com/qKv502V.jpeg" class="profile-img">

<h1>@Melzinha 🤭❤🔥</h1>

<p class="bio">
Meu Grupo de Prévias totalmente Grátis 🤭❤ <br>
Molhadinha esperando você  , com os melhores Conteúdos 🤤👇
</p>

<a href="https://t.me/+Akujc6HItcY5ZDBh" class="btn">
🔒 ENTRAR AGORA (GRÁTIS)
</a>

<p class="timer">
⚠️ O link para entrar é válido por pouco tempo...
</p>

</div>

</body>
</html>
